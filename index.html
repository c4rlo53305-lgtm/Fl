<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurador GL</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .img-box { border: 2px dashed #444; height: 250px; margin: 10px 0; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        img { max-width: 100%; max-height: 100%; }
        button { width: 100%; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: bold; }
        button:disabled { background: #333; }
        #status { font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h3>Restaurador GL</h3>
    <div class="img-box" onclick="document.getElementById('fileIn').click()">
        <img id="imgOri" style="display:none">
        <p id="t1">Subir Foto</p>
        <input type="file" id="fileIn" hidden accept="image/*">
    </div>
    <div class="img-box"><img id="imgRes" style="display:none"><p id="t2">Resultado</p></div>
    <button id="goBtn">RESTAURAR</button>
    <div id="status">Selecciona una foto para empezar</div>
</div>

<script>
    const HF_TOKEN = "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";
    const fileIn = document.getElementById('fileIn');
    const imgOri = document.getElementById('imgOri');
    const imgRes = document.getElementById('imgRes');
    const goBtn = document.getElementById('goBtn');
    const status = document.getElementById('status');

    fileIn.onchange = e => {
        const reader = new FileReader();
        reader.onload = () => {
            imgOri.src = reader.result;
            imgOri.style.display = "block";
            document.getElementById('t1').style.display = "none";
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    goBtn.onclick = async () => {
        if(!imgOri.src) return;
        goBtn.disabled = true;
        status.innerText = "Procesando...";

        try {
            // Convertimos la imagen a un formato simple (Blob)
            const blob = await (await fetch(imgOri.src)).blob();

            // Usamos un modelo más liviano de Hugging Face
            const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0", {
                headers: { "Authorization": `Bearer ${HF_TOKEN}` },
                method: "POST",
                body: blob,
            });

            if (response.ok) {
                const resBlob = await response.blob();
                imgRes.src = URL.createObjectURL(resBlob);
                imgRes.style.display = "block";
                document.getElementById('t2').style.display = "none";
                status.innerText = "¡Completado!";
            } else {
                const err = await response.json();
                status.innerText = "IA ocupada. Reintenta en 15 seg.";
            }
        } catch (e) {
            status.innerText = "Error de Red: Necesitas HTTPS (usa Ngrok).";
        } finally {
            goBtn.disabled = false;
        }
    };
</script>
</body>
</html>
