<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FoodLink GL - Omni AI</title>
    <style>
        :root { --red: #ff3333; --dark: #070707; --card: #141414; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Evita el scroll molesto en el cuerpo */
        body { 
            background: var(--dark); 
            color: white; 
            font-family: sans-serif; 
            height: 100vh; 
            height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER FIJO */
        header { 
            padding: 12px; 
            background: #111; 
            border-bottom: 2px solid var(--red); 
            display: flex; 
            justify-content: center; 
            flex-shrink: 0; 
            z-index: 100;
        }
        .logo { display: flex; align-items: center; font-weight: 900; font-size: 22px; }
        .l-f { color: var(--red); }
        .tag { font-size: 9px; background: var(--red); color: white; padding: 2px 5px; border-radius: 3px; margin-left: 5px; }

        /* AREA DE CHAT: Ajuste dinámico para no tapar nada */
        #chat-box { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            /* El padding inferior es vital para que el último mensaje libre la barra */
            padding-bottom: 90px; 
            -webkit-overflow-scrolling: touch;
        }

        .msg { padding: 12px 15px; border-radius: 15px; max-width: 88%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .ai { align-self: flex-start; background: var(--card); border-left: 4px solid var(--red); }
        .user { align-self: flex-end; background: var(--red); color: white; }

        /* BARRA DE ESCRITURA: "FLOTANTE" PERO ANCLADA AL FONDO */
        .footer { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            padding: 12px; 
            background: rgba(12, 12, 12, 0.95); 
            backdrop-filter: blur(10px);
            border-top: 1px solid #222; 
            z-index: 2000; /* Asegura que siempre esté al frente */
        }
        .input-row { 
            display: flex; 
            gap: 10px; 
            background: #1a1a1a; 
            padding: 5px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            max-width: 600px; 
            margin: 0 auto;
            align-items: center;
        }
        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 10px 15px; 
            outline: none; 
            font-size: 16px; /* Evita zoom automático en iPhone */
            width: 100%;
        }
        button { 
            background: var(--red); 
            color: white; 
            border: none; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 20px; 
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-status { font-size: 10px; color: var(--red); text-align: center; margin-bottom: 5px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span class="l-f">Food</span>Link<span class="tag">GL</span></div>
</header>

<div id="chat-box">
    <div class="msg ai">**Omni AI FoodLink GL** lista.
    He corregido el diseño para que la barra siempre sea visible y los mensajes no se tapen. ¿Qué necesitas investigar hoy?</div>
</div>

<div class="footer">
    <div id="loader" class="loader-status">PROCESANDO DATOS 2026...</div>
    <div class="input-row">
        <input type="text" id="prompt" placeholder="Tu duda aquí..." autocomplete="off">
        <button onclick="ask()">➔</button>
    </div>
</div>

<script>
    const KEY = "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";
    let memoria = [
        { role: "system", content: "Eres la Omni-IA de FoodLink GL. Hoy es 11 de Abril de 2026. Responde de forma BREVE y usa datos actuales. TARIFAS: 0-2km $35, 2-4km $40, 4-6km $45, 6-7km $50, 7-8km $55, 8-9km $60, 9-11km $65, 11-13km $70, 13km+ $75. Adicionales: Lluvia/Compra +$10." }
    ];

    async function ask() {
        const inp = document.getElementById('prompt');
        const load = document.getElementById('loader');
        const txt = inp.value.trim();
        if(!txt) return;

        addMsg(txt, 'user');
        memoria.push({ role: "user", content: txt });
        inp.value = "";
        load.style.display = "block";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${KEY}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: memoria,
                    temperature: 0.7
                })
            });
            const data = await res.json();
            const r = data.choices[0].message.content;
            addMsg(r, 'ai');
            memoria.push({ role: "assistant", content: r });
            if(memoria.length > 8) memoria.splice(1, 2);
        } catch (e) {
            addMsg("Error de conexión.", 'ai');
        } finally {
            load.style.display = "none";
        }
    }

    function addMsg(t, c) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerHTML = t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        b.appendChild(d);
        // Scroll automático suave
        setTimeout(() => { b.scrollTo({ top: b.scrollHeight, behavior: 'smooth' }); }, 150);
    }
    
    document.getElementById('prompt').addEventListener('keypress', e => { if(e.key === 'Enter') ask(); });
</script>
</body>
</html>
