<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurador GL Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .img-box { border: 2px dashed #334155; height: 280px; margin: 15px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #070b14; border-radius: 10px; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        button { width: 100%; padding: 16px; background: #6366f1; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #334155; opacity: 0.7; }
        #status { margin-top: 15px; font-size: 13px; color: #94a3b8; min-height: 40px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0">✨ Restaurador GL</h3>
    
    <div class="img-box" onclick="document.getElementById('fileIn').click()">
        <p id="t1" style="padding:20px">Toca aquí para subir la foto antigua</p>
        <img id="imgOri" style="display:none">
        <input type="file" id="fileIn" hidden accept="image/*">
    </div>

    <div class="img-box">
        <p id="t2">Resultado IA</p>
        <img id="imgRes" style="display:none">
    </div>

    <button id="goBtn">RESTAURAR AHORA</button>
    <div id="status">Esperando imagen...</div>
</div>

<script>
    const HF_TOKEN = "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";
    
    const fileIn = document.getElementById('fileIn');
    const imgOri = document.getElementById('imgOri');
    const imgRes = document.getElementById('imgRes');
    const goBtn = document.getElementById('goBtn');
    const statusTxt = document.getElementById('status');

    fileIn.onchange = e => {
        const reader = new FileReader();
        reader.onload = () => {
            imgOri.src = reader.result;
            imgOri.style.display = "block";
            document.getElementById('t1').style.display = "none";
            statusTxt.innerText = "Imagen cargada correctamente.";
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // Función para comprimir la imagen y evitar errores de "Failed to fetch"
    async function getOptimizedBlob(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                // Reducimos a 512px para que la IA gratuita no se sature
                const size = 512; 
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.8);
            };
            img.src = dataUrl;
        });
    }

    goBtn.onclick = async () => {
        if(!imgOri.src) return alert("Sube una foto primero");
        
        goBtn.disabled = true;
        statusTxt.innerHTML = '<div class="loader"></div> Conectando con servidor seguro...';

        try {
            const blob = await getOptimizedBlob(imgOri.src);

            // Usamos el modelo de "Upscaling" que es el más estable para Hugging Face gratis
            const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-x4-upscaler", {
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/octet-stream"
                },
                method: "POST",
                body: blob,
            });

            if (response.status === 503) {
                statusTxt.innerText = "La IA está despertando. Reintenta en 15 segundos.";
            } else if (!response.ok) {
                statusTxt.innerText = "Error del servidor. Intenta con otra foto.";
            } else {
                const resBlob = await response.blob();
                imgRes.src = URL.createObjectURL(resBlob);
                imgRes.style.display = "block";
                document.getElementById('t2').style.display = "none";
                statusTxt.innerText = "✅ ¡Restauración exitosa!";
            }
        } catch (e) {
            statusTxt.innerText = "❌ Error de red. Asegúrate de tener buena señal o WiFi.";
            console.error(e);
        } finally {
            goBtn.disabled = false;
        }
    };
</script>

</body>
</html>
