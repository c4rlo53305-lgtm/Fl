<body>

<div class="container">
    <div class="header">
        <h1>AI Precision Eraser</h1>
        <p class="tagline">Eliminación exacta conservando cada detalle</p>
    </div>

    <div class="editor-card">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div id="uploadPrompt">
                <span style="font-size: 2.5rem;">🖼️</span>
                <p>Toca para subir la foto original</p>
            </div>
            <img id="previewImg" src="" alt="Vista previa">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <textarea id="promptInput" rows="2" placeholder="Ej: Elimina el cable de luz y el poste del fondo..."></textarea>
        
        <button id="btnRun" class="btn-main" disabled>INICIAR EDICIÓN MÁGICA</button>

        <div id="loader">
            <div class="spinner"></div>
            <p style="color: var(--neon); font-size: 0.9rem; margin-top: 10px;">Procesando con máxima exactitud...</p>
        </div>
    </div>

    <div id="resultArea">
        <h3 style="font-size: 0.9rem; color: var(--neon); text-align: center; text-transform: uppercase;">Foto Editada:</h3>
        <img id="resultImg" src="">
        <a id="downloadBtn" class="download-btn">GUARDAR EN DISPOSITIVO</a>
        <button onclick="location.reload()" style="background:none; border:none; color:#8b949e; width:100%; margin-top:15px; cursor:pointer; font-size: 0.8rem;">Limpiar y editar otra</button>
    </div>
</div>

<script type="module">
    const apiKey = ""; // La clave se inyecta automáticamente aquí

    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('previewImg');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const btnRun = document.getElementById('btnRun');
    const promptInput = document.getElementById('promptInput');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    let imageBase64 = "";

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            imageBase64 = event.target.result.split(',')[1];
            previewImg.src = event.target.result;
            previewImg.style.display = 'block';
            uploadPrompt.style.display = 'none';
            btnRun.disabled = false;
        };
        reader.readAsDataURL(file);
    };

    async function callGeminiEdit(prompt, base64) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{
                parts: [
                    { text: `Edit this image by removing the following object: "${prompt}". 
                             CRITICAL REQUIREMENT: You must preserve all other elements, textures, lighting, and details of the original image with 100% accuracy. 
                             Only modify the area where the removed object was, filling it realistically to match the background.` },
                    { inlineData: { mimeType: "image/png", data: base64 } }
                ]
            }],
            generationConfig: {
                responseModalities: ["TEXT", "IMAGE"]
            }
        };

        let delay = 1000;
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                const imagePart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if (imagePart) return imagePart.inlineData.data;
                
            } catch (err) {
                if (i === 4) throw err;
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
        }
    }

    btnRun.onclick = async () => {
        const prompt = promptInput.value.trim();
        if (!prompt || !imageBase64) return;

        btnRun.disabled = true;
        loader.style.display = 'block';
        resultArea.style.display = 'none';

        try {
            const resultBase64 = await callGeminiEdit(prompt, imageBase64);
            
            if (resultBase64) {
                const finalUrl = `data:image/png;base64,${resultBase64}`;
                resultImg.src = finalUrl;
                downloadBtn.href = finalUrl;
                downloadBtn.download = `edit_carlos_${Date.now()}.png`;
                
                resultArea.style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                alert("La IA no devolvió una imagen. Intenta describir el objeto de forma más clara.");
            }
        } catch (error) {
            alert("Error de conexión. Intenta de nuevo en unos segundos.");
        } finally {
            loader.style.display = 'none';
            btnRun.disabled = false;
        }
    };
</script>

</body>
</html>
