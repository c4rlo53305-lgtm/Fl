<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Restorer Pro - Tencent ARC</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        header { margin-bottom: 25px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; text-transform: uppercase; }
        
        .upload-box { background: var(--card); border: 2px dashed var(--accent); padding: 40px; border-radius: 20px; cursor: pointer; margin-bottom: 25px; transition: 0.3s; }
        .upload-box:hover { background: rgba(0, 242, 255, 0.05); }
        
        .btn-ai { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }
        .btn-ai:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-ai:disabled { background: #4b5563; opacity: 0.7; cursor: not-allowed; transform: none; }

        .results { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 25px; }
        .canvas-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; }
        h3 { color: #8b949e; font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        img { width: 100%; border-radius: 10px; background: #000; min-height: 200px; object-fit: contain; }

        #loader { display: none; margin: 20px 0; color: var(--accent); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        #errorBox { display: none; background: rgba(255, 0, 0, 0.1); color: #ff6b6b; border: 1px solid #ff6b6b; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 0.9rem; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Face Restorer</h1>
        <p>Restauración Facial HD (Tencent ARC)</p>
    </header>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p id="statusText">Toca para subir foto borrosa</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <button id="btnAi" class="btn-ai" disabled>RECONSTRUIR CARA AHORA</button>
    
    <div id="loader">⚡ Procesando... (Puede tardar 30 segundos)</div>
    <div id="errorBox"></div>

    <div id="results" class="results" style="display:none;">
        <div class="canvas-card">
            <h3>Original</h3>
            <img id="imgOri">
        </div>
        <div class="canvas-card">
            <h3>Resultado IA</h3>
            <img id="imgRes">
            <button id="btnDown" style="margin-top:15px; background: #22c55e; border:none; color:white; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold; width: 100%;">DESCARGAR HD</button>
        </div>
    </div>
</div>

<script>
    const HF_TOKEN = "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"; 
    const API_URL = "https://api-inference.huggingface.co/models/tencentarc/GFPGAN";

    const fileInput = document.getElementById('fileInput');
    const btnAi = document.getElementById('btnAi');
    const imgOri = document.getElementById('imgOri');
    const imgRes = document.getElementById('imgRes');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');
    const resultsDiv = document.getElementById('results');

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            imgOri.src = URL.createObjectURL(file);
            resultsDiv.style.display = 'grid';
            btnAi.disabled = false;
            errorBox.style.display = 'none';
            document.getElementById('statusText').innerText = "Imagen: " + file.name;
        }
    };

    btnAi.onclick = async () => {
        btnAi.disabled = true;
        loader.style.display = 'block';
        errorBox.style.display = 'none';
        imgRes.src = ""; 

        try {
            const response = await fetch(API_URL, {
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/octet-stream"
                },
                method: "POST",
                body: fileInput.files[0],
                cache: "no-cache"
            });

            if (!response.ok) {
                const err = await response.json();
                if (err.error && err.error.includes("loading")) {
                    throw new Error("El servidor de IA está despertando. Espera 15 segundos y vuelve a pulsar el botón.");
                }
                throw new Error(err.error || "Error en el servidor");
            }

            const blob = await response.blob();
            if (blob.type.includes("image")) {
                imgRes.src = URL.createObjectURL(blob);
            } else {
                throw new Error("El servidor no devolvió una imagen. Reintenta.");
            }

        } catch (err) {
            errorBox.style.display = 'block';
            errorBox.innerText = err.message === "Failed to fetch" 
                ? "Error: Conexión lenta o interrumpida. Vuelve a intentarlo." 
                : err.message;
        } finally {
            btnAi.disabled = false;
            loader.style.display = 'none';
        }
    };

    document.getElementById('btnDown').onclick = () => {
        if (!imgRes.src) return;
        const a = document.createElement('a');
        a.href = imgRes.src;
        a.download = "foto_restaurada.png";
        a.click();
    };
</script>
</body>
</html>
