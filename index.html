<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Restorer - CodeFormer Edition</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        .upload-box { background: var(--card); border: 2px dashed var(--accent); padding: 30px; border-radius: 20px; cursor: pointer; margin-bottom: 20px; }
        .btn-ai { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-ai:disabled { background: #4b5563; opacity: 0.7; }
        .results { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 25px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; }
        img { width: 100%; border-radius: 10px; background: #000; min-height: 200px; object-fit: contain; }
        #loader { display: none; margin: 20px 0; color: var(--accent); font-weight: bold; }
        #errorBox { display: none; background: rgba(255, 0, 0, 0.1); color: #ff6b6b; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #ff6b6b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Face Restorer</h1>
        <p>Potenciado por CodeFormer IA</p>
    </header>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p id="statusText">Toca para cargar la captura</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <button id="btnAi" class="btn-ai" disabled>RECONSTRUIR CARA</button>
    
    <div id="loader">⚡ Despertando a la IA... espera un momento.</div>
    <div id="errorBox"></div>

    <div id="results" class="results" style="display:none;">
        <div class="card">
            <h3>Original</h3>
            <img id="imgOri">
        </div>
        <div class="card">
            <h3>Resultado HD</h3>
            <img id="imgRes">
            <button id="btnDown" style="margin-top:15px; background: #22c55e; border:none; color:white; padding:15px; border-radius:10px; cursor:pointer; font-weight:bold; width: 100%;">DESCARGAR</button>
        </div>
    </div>
</div>

<script>
    const HF_TOKEN = "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"; 
    // Cambiamos a CodeFormer, un modelo más ligero y rápido para móviles
    const API_URL = "https://api-inference.huggingface.co/models/sczhou/CodeFormer";

    const fileInput = document.getElementById('fileInput');
    const btnAi = document.getElementById('btnAi');
    const imgOri = document.getElementById('imgOri');
    const imgRes = document.getElementById('imgRes');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');

    fileInput.onchange = (e) => {
        if (e.target.files[0]) {
            imgOri.src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('results').style.display = 'grid';
            btnAi.disabled = false;
            errorBox.style.display = 'none';
        }
    };

    btnAi.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return;

        btnAi.disabled = true;
        loader.style.display = 'block';
        errorBox.style.display = 'none';
        imgRes.src = ""; 

        try {
            const arrayBuffer = await file.arrayBuffer();

            // Realizamos la petición
            const response = await fetch(API_URL, {
                headers: { "Authorization": `Bearer ${HF_TOKEN}` },
                method: "POST",
                body: arrayBuffer
            });

            if (!response.ok) {
                const data = await response.json();
                if (data.error && data.error.includes("loading")) {
                    // Si está cargando, esperamos 5 segundos y reintentamos automáticamente una vez
                    loader.innerText = "⏳ El servidor se está iniciando, reintentando automáticamente...";
                    await new Promise(res => setTimeout(res, 5000));
                    return btnAi.onclick(); 
                }
                throw new Error(data.error || "Error en la IA.");
            }

            const blob = await response.blob();
            imgRes.src = URL.createObjectURL(blob);
            loader.style.display = 'none';

        } catch (err) {
            errorBox.style.display = 'block';
            errorBox.innerText = (err.message === "Failed to fetch") 
                ? "Error de conexión: Reintenta pulsando el botón otra vez." 
                : err.message;
        } finally {
            btnAi.disabled = false;
            loader.innerText = "⚡ Procesando... Espera un momento.";
            if (!imgRes.src) loader.style.display = 'none';
        }
    };

    document.getElementById('btnDown').onclick = () => {
        const a = document.createElement('a');
        a.href = imgRes.src;
        a.download = "cara_restaurada.png";
        a.click();
    };
</script>
</body>
</html>
